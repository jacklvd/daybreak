<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shapeRendering="crispEdges">
  <!-- Daybreak: a pixel sun rising over a dawn horizon in a dark indigo sky -->
  <rect width="16" height="16" fill="#12101E"/>
  <!-- coral rays -->
  <rect x="7"  y="1" width="2" height="2" fill="#FF5C33"/>
  <rect x="2"  y="3" width="2" height="2" fill="#FF5C33"/>
  <rect x="12" y="3" width="2" height="2" fill="#FF5C33"/>
  <rect x="1"  y="7" width="2" height="2" fill="#FF5C33"/>
  <rect x="13" y="7" width="2" height="2" fill="#FF5C33"/>
  <!-- gold sun disc -->
  <rect x="6" y="5"  width="4" height="1" fill="#FFBF29"/>
  <rect x="5" y="6"  width="6" height="4" fill="#FFBF29"/>
  <rect x="6" y="10" width="4" height="1" fill="#FFBF29"/>
  <!-- dawn horizon -->
  <rect x="0" y="13" width="16" height="1" fill="#FF5C33"/>
  <rect x="0" y="14" width="16" height="2" fill="#FFB685"/>
</svg>
